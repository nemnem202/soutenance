services:
  db:
    image: postgres:16-alpine
    container_name: music-sandbox-db-ci
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - music-sandbox-data-ci:/var/lib/postgresql/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 5s
      retries: 5
  app:
    build:
      context: .
      dockerfile: dockerfile.ci
    image: music-sandbox-app-ci
    container_name: music-sandbox-app-ci
    depends_on:
      db:
        condition: service_healthy
    environment:
      NODE_ENV: test
      APP_PORT: ${APP_PORT}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
      DATABASE_URL: ${DATABASE_URL}
      TOKEN_SECRET: ${TOKEN_SECRET}
    ports:
      - "${APP_PORT}:3000"
    volumes:
      - ./:/app
      - /app/node_modules
    command: ["sh", "-c", "pnpm prisma generate && pnpm prisma migrate deploy && pnpm lint && pnpm test"]
volumes:
  music-sandbox-data-ci: