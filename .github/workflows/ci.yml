name: CI

on:
  push:
    branches:
      - main 
  pull_request:
    branches:
      - main     
jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4       
        with:
          submodules: recursive

      - name: Setup Docker Buildx
        uses: docker/setup-buildx-action@v2

      - name: Create .env.prod
        run: |
          echo "POSTGRES_USER=${{ secrets.POSTGRES_USER }}" >> .env.prod
          echo "POSTGRES_PASSWORD=${{ secrets.POSTGRES_PASSWORD }}" >> .env.prod
          echo "POSTGRES_DB=${{ secrets.POSTGRES_DB }}" >> .env.prod
          echo "DATABASE_URL=${{ secrets.DATABASE_URL }}" >> .env.prod
          echo "APP_PORT=${{ secrets.APP_PORT }}" >> .env.prod
          echo "TOKEN_SECRET=${{ secrets.TOKEN_SECRET }}" >> .env.prod
          echo "GOOGLE_CLIENT_ID=${{ secrets.GOOGLE_CLIENT_ID }}" >> .env.prod
          echo "GOOGLE_CLIENT_SECRET=${{ secrets.GOOGLE_CLIENT_SECRET }}" >> .env.prod
          echo "GOOGLE_REDIRECT_PATH=${{ secrets.GOOGLE_REDIRECT_PATH }}" >> .env.prod
          echo "APP_BASE_URL=${{ secrets.APP_BASE_URL }}" >> .env.prod
          echo "CLOUD_API_KEY=${{ secrets.CLOUD_API_KEY }}" >> .env.prod
          echo "CLOUD_API_SECRET=${{ secrets.CLOUD_API_SECRET }}" >> .env.prod
          echo "CLOUD_IMAGE_FOLDER_NAME=${{ secrets.CLOUD_IMAGE_FOLDER_NAME }}" >> .env.prod
          echo "CLOUD_NAME=${{ secrets.CLOUD_NAME }}" >> .env.prod
      - name: Build and run CI containers
        run: make ci