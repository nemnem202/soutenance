name: Lint

on:
  pull_request:
    branches:
      - main 

jobs:
  lint:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

        
      - name: Setup Docker Buildx
        uses: docker/setup-buildx-action@v2
        
      - name: Create .env.prod
        run: |
          echo "POSTGRES_USER=${{ secrets.POSTGRES_USER }}" >> .env.prod
          echo "POSTGRES_PASSWORD=${{ secrets.POSTGRES_PASSWORD }}" >> .env.prod
          echo "POSTGRES_DB=${{ secrets.POSTGRES_DB }}" >> .env.prod
          echo "APP_PORT=${{ secrets.APP_PORT }}" >> .env.prod

      - name: Build and run CI containers
        run: make ci  

      - name: Show exit code
        run: |
          EXIT_CODE=$(docker wait $(docker ps -q))
          echo "Exit code: $EXIT_CODE"
          if [ "$EXIT_CODE" -ne 0 ]; then
            echo "Tests or lint failed"
            exit 1
          fi