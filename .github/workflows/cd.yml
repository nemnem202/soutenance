name: CD

on:
  push:
    branches:
      - main

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
    
    
      -  name: Build and push Docker image
         uses: docker/build-push-action@v5
         with:
          context: .
          file: dockerfile.prod
          push: true
          tags: |
            ghcr.io/${{ github.repository_owner }}/music-sandbox:latest
            ghcr.io/${{ github.repository_owner }}/music-sandbox:${{ github.sha }}

  deploy:
    runs-on: ubuntu-latest
    needs: build-and-push

    steps:
      - name: Deploy on VPS
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            cd ~/Projects/Music-sandbox
            make clear-preprod
            make free-space
            docker compose --env-file .env.preprod -f docker-compose.preprod.yml pull
            docker compose --env-file .env.preprod -f docker-compose.preprod.yml up -d
