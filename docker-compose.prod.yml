services:
  db:
    image: postgres:16-alpine
    container_name: music-sandbox-db-prod
    env_file:
      - .env.prod
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 5s
      retries: 5
  app:
    build:
      context: .
      dockerfile: dockerfile.prod
    image: music-sandbox-app-prod
    container_name: music-sandbox-app-prod
    depends_on:
      db:
        condition: service_healthy
    environment:
      NODE_ENV: prod
    env_file:
      - .env.prod
    ports:
      - "${APP_PORT}:3000"
    command: ["sh", "-c", "pnpm prisma migrate deploy && node ./dist/server/index.mjs"]
    restart: unless-stopped