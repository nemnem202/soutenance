services:
  db:
    image: postgres:16-alpine
    container_name: music-sandbox-db-dev
    env_file:
      - .env.dev
    volumes:
      - music-sandbox-data-dev:/var/lib/postgresql/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 5s
      retries: 5

  migrate:
    build:
      context: .
      dockerfile: dockerfile.dev
    image: music-sandbox-app-dev
    depends_on:
      db:
        condition: service_healthy
    env_file:
      - .env.dev
    volumes:
      - ./prisma:/app/prisma 
      - ./prisma.config.ts:/app/prisma.config.ts
    command: ["pnpm", "prisma", "migrate", "deploy"]
    restart: on-failure 

  app:
    build:
      context: .
      dockerfile: dockerfile.dev
    image: music-sandbox-app-dev
    container_name: music-sandbox-app-dev
    depends_on:
      migrate:
        condition: service_completed_successfully
    environment:
      NODE_ENV: dev
      CHOKIDAR_USEPOLLING: "true"
    env_file:
      - .env.dev
    ports:
      - "${APP_PORT}:3000"
    volumes:
      - ./:/app
      - /app/node_modules    
      - /app/.next           
    command: ["pnpm", "dev"]
    restart: unless-stopped

volumes:
  music-sandbox-data-dev: